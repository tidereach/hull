# Pre-commit hooks for Spektralia
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix]
      - id: ruff-format
        name: ruff format

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: black formatter
        language_version: python3

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        name: mypy type check
        args: [--config-file=pyproject.toml]
        files: ^src/spektralia/

  - repo: local
    hooks:
      - id: hook-invariants
        name: Audit §18 hook invariants
        language: python
        entry: python scripts/audit_hook_invariants.py
        files: ^integrations/claude/
        pass_filenames: false
        always_run: false

      - id: lock-sbom-guard
        name: Lock/SBOM freshness guard
        language: python
        entry: python scripts/check_lock_sbom_fresh.py
        files: ^pyproject\.toml$
        pass_filenames: false
        always_run: false
