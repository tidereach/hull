# Example layer-repo CI template
#
# Copy this file to `<layer-repo>/.github/workflows/ci.yml` at repo bootstrap.
# Uncomment per-layer test jobs as the layer's source tree lands.
#
# This template wires the five universal reusable workflows that every layer
# repo must call (per MAIN.md § 11 Stage 1 deliverables):
#
#   1. legacy-name-guard  — MAIN.md § 8 Constraint 6
#   2. gitleaks           — MAIN.md § 7 Decision 18(a)
#   3. pr-title-lint      — MAIN.md § 7 Decision 18(b)
#   4. signature-verify   — MAIN.md § 7 Decision 10
#
# Image signing (Decision 17) is airlock-specific and lives in airlock's
# `release.yml`, not in this generic ci.yml.
#
# The reusable workflows are pinned to `@main` for v1; once hull cuts tagged
# releases, consumers should pin to a release tag (e.g. `@v1.0.0`) so a hull
# refactor cannot break every layer repo's CI at once.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-name-guard:
    uses: tidereach/hull/.github/workflows/legacy-name-guard.yml@main

  gitleaks:
    uses: tidereach/hull/.github/workflows/gitleaks.yml@main
    secrets: inherit

  pr-title-lint:
    uses: tidereach/hull/.github/workflows/pr-title-lint.yml@main

  signature-verify:
    uses: tidereach/hull/.github/workflows/signature-verify.yml@main

