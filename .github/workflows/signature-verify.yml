# Reusable workflow: signature-verify
#
# Enforces MAIN.md § 7 Decision 10 — gitsign (sigstore) signed commits are
# required on `main` across all five repos. Branch protection's
# "require signed commits" rule is the PRIMARY enforcement; this workflow
# gives operators a per-PR pass/fail signal that the contributor's commits
# carry a valid Fulcio cert chain in the Rekor transparency log.
#
# Behavior:
#   - On pull_request: verify every commit in the PR's range.
#   - On push to main: verify HEAD (the just-merged squash commit per Decision 11).
#
# Failure prints the offending commit SHA + cert subject so the operator can
# either re-sign and force-push the branch, or audit the chain.
#
# KNOWN-LOOSE IDENTITY REGEX (v1 floor):
#   EXPECTED_IDENTITY_REGEX is `.+` because we cannot pre-compute the operator's
#   sigstore-OIDC identity SAN without observing a real signed commit in Rekor
#   first. The operator's GitHub handle (`dotknewt`) is known, but the
#   verified-email shape that Fulcio embeds in the cert SAN cannot be inferred
#   from the handle alone — GitHub login OIDC can present any verified email
#   on the account, and `noreply` shapes vary (`<id>+<login>@users.noreply...`).
#
#   Tightening procedure (run once after the first signed commit lands on `main`):
#     1. Find the first signed commit's Rekor entry:
#          rekor-cli search --sha <commit-sha>
#          rekor-cli get --uuid <uuid> --format json | jq -r '.Body.HashedRekordObj.signature.publicKey.content' | base64 -d | openssl x509 -text -noout | grep -A1 'Subject Alternative Name'
#     2. Replace `.+` with a regex pinning that email shape, e.g.
#          ^<observed-email>$
#        committed as a follow-up tightening PR.
#   Until then, the issuer-regex floor (Fulcio + accepted OIDC issuers) is the
#   real security boundary; identity is a "any verified subject" check.
#
# Consumer usage (from a layer repo `.github/workflows/ci.yml`):
#
#   jobs:
#     signature-verify:
#       uses: tidereach/hull/.github/workflows/signature-verify.yml@main

name: signature-verify

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  # NB: no `id-token: write` — gitsign verify reads the cert already attached
  # to the commit; it does NOT request a new OIDC token. Least-privilege.

concurrency:
  group: signature-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Accept the two OIDC issuers that Decision 10 covers:
      #   - https://github.com/login/oauth       (operator commits via gh auth login)
      #   - https://token.actions.githubusercontent.com  (CI-bot commits via Actions)
      # Anything else fails verification — the regex is the identity floor, not `.*`.
      EXPECTED_ISSUER_REGEX: '^https://(github\.com/login/oauth|token\.actions\.githubusercontent\.com)$'
      # Identity floor: any subject is accepted as long as the issuer matches above.
      # The operator handle is known (`dotknewt`, Decision 19), but the
      # exact SAN-email shape Fulcio embeds cannot be derived from the handle
      # alone. Tighten this regex via the procedure in the header comment once
      # the first signed commit's SAN has been observed in Rekor.
      EXPECTED_IDENTITY_REGEX: '.+'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Need history to verify all commits in the PR range.
          fetch-depth: 0

      - name: Install gitsign
        uses: chainguard-dev/actions/setup-gitsign@f0be69916b439d0fcced2451b23d0f27cd46d545  # main HEAD as of 2026-06-29 (chainguard-dev/actions has no semver tags; loose-pin to main per docs/CI.md § 4)

      - name: Determine commit range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "range=${BASE}..${HEAD}" >> "$GITHUB_OUTPUT"
          else
            # push to main: verify just the new commit.
            echo "range=HEAD~1..HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify gitsign signatures across range
        shell: bash
        env:
          RANGE: ${{ steps.range.outputs.range }}
        run: |
          set -euo pipefail
          FAIL=0
          for SHA in $(git rev-list "${RANGE}"); do
            echo "::group::verify ${SHA}"
            if ! gitsign verify \
                --certificate-oidc-issuer-regexp "${EXPECTED_ISSUER_REGEX}" \
                --certificate-identity-regexp "${EXPECTED_IDENTITY_REGEX}" \
                "${SHA}"; then
              echo "::error::commit ${SHA} has no valid sigstore signature with an accepted issuer (MAIN.md § 7 Decision 10)."
              echo "::error::Accepted issuers: github.com/login/oauth (operator), token.actions.githubusercontent.com (CI)."
              FAIL=1
            fi
            echo "::endgroup::"
          done
          if [[ "${FAIL}" -ne 0 ]]; then
            echo "::error::One or more commits in ${RANGE} lack a valid gitsign signature."
            echo "::error::Re-sign with: GIT_CONFIG_GLOBAL=<your config> git commit --amend -S --no-edit"
            echo "::error::or rebase the branch with gitsign configured."
            exit 1
          fi
          echo "signature-verify: all commits in ${RANGE} carry valid sigstore signatures."
