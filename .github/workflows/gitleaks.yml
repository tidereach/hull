# Reusable workflow: gitleaks
#
# Enforces MAIN.md § 7 Decision 18(a) — gitleaks is the CI + pre-commit secrets
# scanner across all five repos. Chosen over trufflehog for lower false-positive
# rate and single-binary distribution.
#
# Scan strategy:
#   - On pull_request: scan the PR diff (fast; what the contributor is adding).
#   - On push to main: scan full history (catches a secret that slipped through
#     a stale PR or a force-push window before branch protection landed).
#
# Consumer usage (from a layer repo `.github/workflows/ci.yml`):
#
#   jobs:
#     gitleaks:
#       uses: tidereach/hull/.github/workflows/gitleaks.yml@main
#       secrets: inherit
#
# The optional `GITLEAKS_LICENSE` secret enables the GitHub Action's
# organization-license features; absent license, the action still runs the
# open-source scanner. The reusable workflow tolerates either case.

name: gitleaks

on:
  workflow_call:
    secrets:
      GITLEAKS_LICENSE:
        description: Optional gitleaks-action org license; OSS scanner runs without it.
        required: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 — see docs/CI.md "Pinning"
        with:
          # Full history is needed both for push-to-main full scans and for
          # PR scans (gitleaks-action diffs PR head vs. base, which requires
          # both commits to be present locally).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9 — see docs/CI.md "Pinning"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # On pull_request the action scans the PR diff; on push it scans
          # whatever range fetch-depth: 0 yields (full history).
          GITLEAKS_ENABLE_COMMENTS: "false"
