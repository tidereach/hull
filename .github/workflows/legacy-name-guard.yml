# Reusable workflow: legacy-name-guard
#
# Enforces MAIN.md § 8 Constraint 6 — the historical Spektralia names MUST NEVER
# propagate into the new tidereach/* repositories. This workflow is a REQUIRED
# status check on `main` in every layer repo per Decision 11.
#
# Scan logic lives in scripts/legacy_name_guard.py (also consumed by the
# `legacy-name-guard` pre-commit hook published via .pre-commit-hooks.yaml —
# both entry points share the same pattern and exemptions, no drift).
#
# Consumer usage (from a layer repo `.github/workflows/ci.yml`):
#
#   jobs:
#     legacy-name-guard:
#       uses: tidereach/hull/.github/workflows/legacy-name-guard.yml@main

name: legacy-name-guard

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: legacy-name-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grep-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 — see docs/CI.md "Pinning"
        with:
          fetch-depth: 1

      # When the caller IS hull (hull's own ci.yml uses the local-path form,
      # `uses: ./.github/workflows/legacy-name-guard.yml`), the checkout above
      # already has scripts/legacy_name_guard.py — including any edits the
      # current PR makes to it. Only non-hull callers (interlock and future
      # layer repos, which reference this workflow via the
      # `tidereach/hull/...@main` URL form) need it fetched separately.
      - name: Fetch legacy-name-guard script from hull
        if: github.repository != 'tidereach/hull'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 — see docs/CI.md "Pinning"
        with:
          repository: tidereach/hull
          ref: main  # tracks the same @main pin every consumer uses per docs/CI.md § 1; bump together per docs/CI.md § 6 when hull cuts a tagged release
          path: _hull-legacy-name-guard
          sparse-checkout: |
            scripts/legacy_name_guard.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Scan for legacy Spektralia names
        run: |
          if [ -f scripts/legacy_name_guard.py ]; then
            python scripts/legacy_name_guard.py
          else
            python _hull-legacy-name-guard/scripts/legacy_name_guard.py
          fi
