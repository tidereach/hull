name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('pyproject.toml') }}

      - name: Install dev dependencies
        run: pip install black ruff mypy

      - name: Run Ruff check
        run: ruff check src/ tests/

      - name: Run Black formatter check
        run: black --check src/ tests/

      - name: Run MyPy type checker
        run: mypy src/ --warn-unused-ignores
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-security-${{ hashFiles('requirements.lock') }}

      - name: Install locked production dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package and dev extras
        run: pip install -e ".[dev]"

      - name: Run pip-audit for vulnerability scanning
        run: pip-audit

      - name: Supply chain check
        run: spektralia verify-installed

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ matrix.python-version }}-${{ hashFiles('requirements.lock') }}

      - name: Install locked production dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package and dev extras
        # requirements.lock covers only production deps; dev tools (pytest,
        # respx, cyclonedx-bom) are not locked.  Install them separately so
        # supply-chain coverage applies to the production surface.  Prod deps
        # are already satisfied, so pip only fetches the unlocked dev tools.
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=src/spektralia --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage reports to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ matrix.python-version == '3.14' && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

  verify-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-sbom-cyclonedx

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Check SBOM is up to date
        run: |
          cyclonedx-py requirements --output-reproducible -o SBOM.json requirements.lock
          printf '\n' >> SBOM.json
          git diff --exit-code SBOM.json
