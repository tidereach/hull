name: GuardDog

on:
  pull_request:
    branches: [main]
    paths:
      - requirements.lock
      - pyproject.toml

permissions:
  contents: read

jobs:
  guarddog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      # upload-sarif calls the Actions API (get-a-workflow-run) to attach run
      # metadata; without actions:read it fails with "Resource not accessible
      # by integration".
      actions: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install GuardDog
        run: pip install guarddog

      - name: Scan dependencies with GuardDog
        # GuardDog's `verify` exits non-zero when it surfaces heuristic risks
        # (capability flags, metadata signals). Those are advisory and meant to
        # be triaged via the SARIF upload to the Security tab, not to hard-block
        # PRs — so don't let the scan's exit code fail the job. The SARIF is
        # still produced and uploaded below.
        continue-on-error: true
        run: >-
          guarddog pypi verify requirements.lock
          --output-format sarif
          --exclude-rules repository_integrity_mismatch
          > guarddog.sarif

      - name: Upload SARIF to GitHub code scanning
        # Requires GitHub Advanced Security (code scanning) to be enabled on the
        # repo; when it isn't, the upload fails with "Advanced Security must be
        # enabled". Don't let that hard-fail the check — if/when GHAS is enabled
        # this step starts populating the Security tab automatically.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: guarddog
          sarif_file: guarddog.sarif
