name: Latency Benchmark

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.lock') }}

      - name: Install locked production dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package and dev extras
        run: pip install -e ".[dev]"

      - name: Run latency benchmark
        # Mocks Ollama with respx internally; no live Ollama service needed.
        # Exits 0 if all hook p95 latencies are within budget, 1 otherwise.
        run: python scripts/latency_bench.py
