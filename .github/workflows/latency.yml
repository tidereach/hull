name: Latency Benchmark

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.lock') }}

      - name: Install locked production dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package and dev extras
        run: pip install -e ".[dev]"

      - name: Run latency benchmark
        # Mocks Ollama with respx internally; no live Ollama service needed.
        # Exits 0 if all hook p95 latencies are within budget, 1 otherwise.
        run: python scripts/latency_bench.py
