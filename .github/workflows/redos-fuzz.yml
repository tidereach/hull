name: ReDoS Fuzz

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC nightly
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.lock') }}
          restore-keys: pip-
      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install -e ".[dev]"
      - name: Run ReDoS fuzz
        run: python scripts/redos_fuzz.py
