name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check dependency-review support
        id: support-check
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          IS_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [ "$IS_PRIVATE" != "true" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          advanced_security_status="$(
            gh api "repos/$REPOSITORY" --jq '.security_and_analysis.advanced_security.status // "disabled"'
          )"
          if [ "$advanced_security_status" = "enabled" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping dependency-review because GitHub Advanced Security is not enabled for this private repository."
          fi

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        if: steps.support-check.outputs.supported == 'true'
        with:
          fail-on-severity: moderate
